<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ-ассистент — CyberDoc Pro</title>
    <link rel="stylesheet" href="/css/style.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<nav class="navbar">
    <a href="/" class="nav-brand">
        <div class="logo-icon">C</div>
        CyberDoc
    </a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Меню">&#9776;</button>
    <ul class="nav-links">
        <li><a href="/">Главная</a></li>
        <li><a href="/chat" class="active">ИИ-ассистент</a></li>
        <li><a href="/tools">Инструменты</a></li>
        <li><a href="/ctf">Полигон</a></li>
        <li><a href="/ide">IDE</a></li>
        <li><a href="/api-tester">API</a></li>
    </ul>
</nav>

<div class="chat-layout">
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeChatSidebar()"></div>
    <aside class="chat-sidebar" id="chat-sidebar">
        <div class="chat-sidebar-header">
            <button class="btn btn-primary btn-sm" style="width:100%" onclick="createNewChat(); closeChatSidebar();">+ Новый диалог</button>
        </div>
        <div class="chat-list" id="chat-list"></div>
    </aside>

    <main class="chat-main">
        <div class="chat-mobile-header">
            <button onclick="openChatSidebar()">&#9776; Диалоги</button>
            <span id="mobile-chat-title">CyberDoc ИИ</span>
            <button onclick="createNewChat()">+ Новый</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="chat-empty" id="chat-empty">
                <div class="empty-icon">&#128737;</div>
                <h2>CyberDoc ИИ</h2>
                <p>Задайте вопрос по информационной безопасности</p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="chat-input-box">
                <textarea id="chat-input" placeholder="Введите сообщение..." rows="1"></textarea>
                <button class="send-btn" onclick="handleSend()" title="Отправить">&#10148;</button>
            </div>
        </div>
    </main>
</div>

<script src="/js/chat.js"></script>
<script>
function openChatSidebar() {
    document.getElementById('chat-sidebar').classList.add('mobile-open');
    document.getElementById('sidebar-overlay').classList.add('active');
}
function closeChatSidebar() {
    document.getElementById('chat-sidebar').classList.remove('mobile-open');
    document.getElementById('sidebar-overlay').classList.remove('active');
}
</script>
</body>
</html>
